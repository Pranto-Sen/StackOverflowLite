version: '3.9'

services:

  postgres:
    image: postgres:17
    container_name: stackoverflow-postgres

    restart: always

    environment:
      POSTGRES_DB: stackoverflowlite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stackoverflow-redis

    restart: always

    ports:
      - "6379:6379"

  api:
    container_name: stackoverflow-api

    build:
      context: .
      dockerfile: StackOverflowLite.API/Dockerfile

    depends_on:
      - postgres
      - redis

    ports:
      - "8080:8080"

    environment:

      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=stackoverflowlite;Username=postgres;Password=1234

      Redis__ConnectionString: redis:6379

      Jwt__Key: THIS_IS_A_VERY_SECRET_KEY_123456

      Jwt__Issuer: StackOverflowLite

      Jwt__Audience: StackOverflowLiteUsers

volumes:

  postgres_data: